name: Check Gold Prices

permissions:
  contents: read

concurrency:
  group: viridi-check-gold
  cancel-in-progress: false

on:
  schedule:
    # Every 2 days at 09:00 ICT = 02:00 UTC
    # Using Monday, Wednesday, Friday pattern for predictability
    - cron: '0 2 * * 1,3,5'
  # Allow manual triggering for testing
  workflow_dispatch:

jobs:
  check-gold:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run gold check
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_FROM_EMAIL: ${{ secrets.ALERT_FROM_EMAIL }}
          ALERT_TO_EMAIL: ${{ secrets.ALERT_TO_EMAIL }}
          TZ: Asia/Ho_Chi_Minh
        run: npm run check:gold
